name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
        type: string

run-name: Deploy ${{ github.ref_name }} to GitHub Pages

concurrency:
  group: pages-deploy-${{ github.repository }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NEXT_PUBLIC_BASE_PATH: /mbilal-portfolio

jobs:
  guard:
    name: Validate deployment
    runs-on: ubuntu-latest

    steps:
      - name: Validate deployment
        run: |
          set -euo pipefail

          if [[ "${{ inputs.confirm }}" != "deploy" ]]; then
            echo "::error::Type 'deploy' to confirm deployment."
            exit 1
          fi

          REF="${{ github.ref_name }}"

          if [[ "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "Deploying release tag: $REF"
          else
            echo "::error::This workflow only deploys version tags (v1.2.3)."
            exit 1
          fi

  build:
    name: Build static site
    needs: guard
    runs-on: ubuntu-latest

    outputs:
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      commit_short: ${{ steps.meta.outputs.commit_short }}
      release_label: ${{ steps.meta.outputs.release_label }}
      deployed_at: ${{ steps.meta.outputs.deployed_at }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "release_label=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Verify export
        run: |
          test -f out/index.html
          test -f out/.nojekyll

      - name: Write deployment manifest
        run: |
          cat > out/deployment.json <<EOF
          {
            "site":"mbilal-portfolio",
            "release":"${{ github.ref_name }}",
            "commit":"${{ steps.meta.outputs.commit_sha }}",
            "deployedAt":"${{ steps.meta.outputs.deployed_at }}"
          }
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          {
            echo "## 🚀 Deployment Complete"
            echo ""
            echo "| Field | Value |"
            echo "|------|------|"
            echo "| Tag | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ needs.build.outputs.commit_short }}\` |"
            echo "| URL | ${{ steps.deploy.outputs.page_url }} |"
            echo "| Deployed | ${{ needs.build.outputs.deployed_at }} |"
          } >> $GITHUB_STEP_SUMMARY