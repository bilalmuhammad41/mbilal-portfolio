name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
        type: string

run-name: Deploy ${{ github.ref_name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NEXT_PUBLIC_BASE_PATH: /mbilal-portfolio

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Validate deployment
        run: |
          set -euo pipefail

          if [[ "${{ inputs.confirm }}" != "deploy" ]]; then
            echo "::error::Type 'deploy' to confirm deployment."
            exit 1
          fi

          if [[ "${{ github.ref_type }}" != "tag" ]]; then
            echo "::error::This workflow must be run from a tag."
            exit 1
          fi

          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "::error::Tag must follow semantic versioning (v1.2.3)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug ref
        run: |
          echo "ref:        ${{ github.ref }}"
          echo "ref_name:   ${{ github.ref_name }}"
          echo "ref_type:   ${{ github.ref_type }}"
          echo "commit:"
          git rev-parse HEAD
          git log --oneline -1
          git describe --tags --always

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify export
        run: |
          test -f out/index.html
          test -f out/.nojekyll

          echo "Contents of out:"
          find out -maxdepth 2

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          {
            echo "## Deployment"
            echo ""
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Commit: \`$(git rev-parse --short HEAD)\`"
            echo "- URL: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"